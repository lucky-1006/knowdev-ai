name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Code Linting & Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Linting
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linting Packages
        run: |
          pip install flake8 black ruff

      - name: Run Flake8 Linter
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 ./backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 ./backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Frontend Linting & Type Checking
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run TypeScript Type-Checking
        run: |
          cd frontend
          npx tsc --noEmit

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Testing
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run Backend PyTest
        run: |
          cd backend
          python -m pytest tests/

  build:
    name: Build & Verify Assets
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Compile Next.js Build (Frontend Build verification)
        run: |
          cd frontend
          npm run build

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      # Build Backend Image (Testing only, no push)
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: knowdev/backend:latest

      # Build Frontend Image (Testing only, no push)
      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: knowdev/frontend:latest

  deploy:
    name: Production Deployment Verification
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Environment Configuration
        run: |
          echo "Verifying presence of production environment settings templates..."
          test -f backend/.env.example && echo "Backend template verified."
          test -f frontend/.gitignore && echo "Frontend gitignore verified."

      - name: Deploy Backend to Render (Simulated)
        run: |
          echo "Triggering deployment hook for Render backend..."
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Backend deployment completed successfully (Simulated)."

      - name: Deploy Frontend to Vercel (Simulated)
        run: |
          echo "Running Vercel deployment action..."
          # npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
          echo "Frontend deployment completed successfully (Simulated)."
